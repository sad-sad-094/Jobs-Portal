server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict browser features (camera, mic, geolocation off by default)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: tighten as needed when adding third-party scripts/fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Necesario para que TanStack Router maneje las rutas correctamente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
