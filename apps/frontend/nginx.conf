server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Block MIME-type guessing by the browser
    add_header X-Content-Type-Options "nosniff" always;
    # Forbid embedding this page in frames (stops UI-redress attacks)
    add_header X-Frame-Options "DENY" always;
    # Enable browser XSS auditor for legacy clients
    add_header X-XSS-Protection "1; mode=block" always;
    # Limit referrer information sent on navigation
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Necesario para que TanStack Router maneje las rutas correctamente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
